# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
   os: ubuntu-24.04
   tools:
      python: "3.13"
   # Add debugging commands
   commands:
   # Check what's being installed
      - python -c "import sys; print('Python path:', sys.path)"
      - pwd
      - ls -la
      - ls -la src/
    # Try to import the package
      - python -c "import sys; sys.path.insert(0, 'src'); try: import pseudodynamics; print('SUCCESS: Package found!'); except Exception as e: print(f'FAILED: {e}')"

# Build documentation in the "docs/" directory with Sphinx
sphinx:
   configuration: docs/conf.py

# Optionally, but recommended,
# declare the Python requirements required to build your documentation
# See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
python:
   install:
   # - method: pip
   #   path: .  # This installs your package
   #   extra_requirements:
      # - docs  # It's good practice to have a "docs" extra in pyproject.toml/setup.py
   - requirements: docs/requirements.txt
        